:root {
  --bg: #F4F3EF;
  --surface: #FFFFFF;
  --surface2: #F9F8F5;
  --border: rgba(0,0,0,0.07);
  --border-md: rgba(0,0,0,0.12);
  --text: #18180F;
  --text2: #6B6A62;
  --text3: #9E9D96;
  --accent: #1B4332;
  --accent-light: #D8F3DC;
  --accent-mid: #40916C;
  --blue: #1A3A5C;
  --blue-light: #D6E8F7;
  --amber: #92400E;
  --amber-light: #FEF3C7;
  --rose: #881337;
  --rose-light: #FFE4E6;
  --teal: #134E4A;
  --teal-light: #CCFBF1;
  --radius: 10px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 20px 60px rgba(0,0,0,0.14);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
h1,h2,h3,.logo { font-family: 'Syne', sans-serif; }

/* TOPBAR */
.topbar { background: var(--accent); color: #fff; padding: 0 1.5rem; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; color: #fff; display: flex; align-items: center; gap: 10px; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-mid); }
.topbar-right { display: flex; align-items: center; gap: 20px; }
.tstat { font-size: 12px; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 5px; }
.tstat strong { color: #fff; font-weight: 600; }
.tdot { width: 6px; height: 6px; border-radius: 50%; }

/* STATS PANEL */
.stats-panel { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 1rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); }
.scard { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.75rem 1rem; }
.scard-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
.scard-val { font-size: 26px; font-weight: 700; font-family: 'Syne', sans-serif; color: var(--text); margin-top: 2px; line-height: 1; }
.scard-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.scard-bar { height: 3px; border-radius: 2px; margin-top: 8px; background: var(--border); overflow: hidden; }
.scard-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

/* TOOLBAR */
.toolbar { padding: 0.75rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
.search-wrap input { width: 100%; padding: 7px 12px 7px 32px; border: 1px solid var(--border-md); border-radius: var(--radius); font-size: 13px; font-family: inherit; background: var(--surface2); color: var(--text); outline: none; transition: border-color 0.15s; }
.search-wrap input:focus { border-color: var(--accent-mid); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; }
.filters { display: flex; gap: 6px; flex-wrap: wrap; }
.fbtn { font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border-md); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap; }
.fbtn:hover { background: var(--surface2); }
.fbtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.toolbar-right { margin-left: auto; display: flex; gap: 8px; }
.tbtn { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border-md); background: var(--surface2); color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
.tbtn:hover { background: var(--bg); }
.tbtn-green { background: var(--accent); color: #fff; border-color: var(--accent); }
.tbtn-green:hover { background: var(--accent-mid); }

/* BOARD */
.board-wrap { padding: 1.25rem 1.5rem 2rem; overflow-x: auto; }
.board { display: flex; gap: 12px; min-width: 920px; align-items: flex-start; }
.col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
.col-head { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: var(--radius); font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; font-family: 'Syne', sans-serif; }
.col-cnt { font-size: 12px; font-weight: 700; padding: 1px 8px; border-radius: 10px; }
.col-recibida .col-head { background: var(--blue-light); color: var(--blue); }
.col-recibida .col-cnt { background: rgba(26,58,92,0.12); color: var(--blue); }
.col-analizada .col-head { background: var(--amber-light); color: var(--amber); }
.col-analizada .col-cnt { background: rgba(146,64,14,0.12); color: var(--amber); }
.col-contactada .col-head { background: #F1EFE8; color: #4A4940; }
.col-contactada .col-cnt { background: rgba(74,73,64,0.12); color: #4A4940; }
.col-negociacion .col-head { background: var(--teal-light); color: var(--teal); }
.col-negociacion .col-cnt { background: rgba(19,78,74,0.12); color: var(--teal); }
.col-captada .col-head { background: var(--accent-light); color: var(--accent); }
.col-captada .col-cnt { background: rgba(27,67,50,0.12); color: var(--accent); }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 0.9rem 1rem; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s, transform 0.1s; box-shadow: var(--shadow); }
.card:hover { border-color: var(--border-md); box-shadow: var(--shadow-md); transform: translateY(-1px); }
.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.card-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; font-family: 'Syne', sans-serif; }
.card-loc { font-size: 11px; color: var(--text3); margin-top: 3px; display: flex; align-items: center; gap: 3px; }
.card-price { font-size: 15px; font-weight: 700; color: var(--text); margin-top: 8px; font-family: 'Syne', sans-serif; letter-spacing: -0.3px; }
.card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
.tag-piso { background: var(--blue-light); color: var(--blue); }
.tag-chalet { background: var(--accent-light); color: var(--accent); }
.tag-casa { background: var(--amber-light); color: var(--amber); }
.tag-local { background: var(--rose-light); color: var(--rose); }
.tag-terreno { background: #FEF3C7; color: #92400E; }
.tag-finca { background: #F1EFE8; color: #4A4940; }
.agent-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
.agent-dani { background: #EDE9FE; color: #5B21B6; border-color: rgba(91,33,182,0.15); }
.agent-marc { background: #FEF3C7; color: #92400E; border-color: rgba(146,64,14,0.15); }
.card-phone { font-size: 11px; color: var(--accent-mid); margin-top: 6px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
.card-btn { margin-top: 8px; width: 100%; padding: 6px; border-radius: 8px; border: 1px solid var(--accent-light); background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.12s; letter-spacing: 0.2px; }
.card-btn:hover { background: var(--accent); color: #fff; }
.empty { font-size: 12px; color: var(--text3); text-align: center; padding: 2rem 0; }

/* MODAL */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 300; padding: 1rem; backdrop-filter: blur(3px); }
.modal { background: var(--surface); border-radius: var(--radius-xl); border: 1px solid var(--border); padding: 1.75rem; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; }
.modal-title { font-size: 18px; font-weight: 700; color: var(--text); font-family: 'Syne', sans-serif; line-height: 1.3; max-width: 360px; }
.modal-close { background: var(--surface2); border: 1px solid var(--border); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; color: var(--text2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.1s; }
.modal-close:hover { background: var(--bg); }
.modal-price { font-size: 28px; font-weight: 700; color: var(--accent); font-family: 'Syne', sans-serif; letter-spacing: -0.5px; margin-bottom: 1rem; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.mfield { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.6rem 0.75rem; }
.mfield-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.mfield-val { font-size: 13px; font-weight: 500; color: var(--text); margin-top: 2px; }
.mfield-val a { color: var(--accent-mid); text-decoration: none; }
.mfield-val a:hover { text-decoration: underline; }
.mfield-val.phone { color: var(--accent-mid); font-weight: 600; }
.modal-section { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin: 1rem 0 0.5rem; }
.modal-desc { font-size: 13px; color: var(--text2); line-height: 1.6; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.75rem; }
.modal-input { width: 100%; padding: 8px 10px; border: 1px solid var(--border-md); border-radius: var(--radius); font-size: 13px; color: var(--text); background: var(--surface2); resize: vertical; min-height: 70px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.modal-input:focus { border-color: var(--accent-mid); }
.modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
.mbtn { flex: 1; padding: 9px; border-radius: var(--radius); border: 1px solid var(--border-md); background: transparent; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.12s; }
.mbtn:hover { background: var(--surface2); }
.mbtn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
.mbtn-accent:hover { background: var(--accent-mid); }
.estado-pill { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; }

/* ADD MODAL */
.add-modal { background: var(--surface); border-radius: var(--radius-xl); border: 1px solid var(--border); padding: 1.75rem; max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.add-modal h2 { font-size: 18px; font-weight: 700; font-family: 'Syne', sans-serif; margin-bottom: 1.25rem; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-field { display: flex; flex-direction: column; gap: 4px; }
.form-field.full { grid-column: 1 / -1; }
.form-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.form-input { padding: 8px 10px; border: 1px solid var(--border-md); border-radius: var(--radius); font-size: 13px; color: var(--text); background: var(--surface2); font-family: inherit; outline: none; transition: border-color 0.15s; }
.form-input:focus { border-color: var(--accent-mid); }
textarea.form-input { resize: vertical; min-height: 70px; }

/* RESPONSIVE */
@media (max-width: 600px) {
  .stats-panel { grid-template-columns: repeat(3, 1fr); }
  .topbar-right { display: none; }
  .modal-grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .form-field.full { grid-column: auto; }
}
</style>

  captada: "background:#D8F3DC;color:#1B4332",
};

const BAR_COLORS = {
  recibida:"#378ADD", analizada:"#F59E0B", contactada:"#9E9D96", negociacion:"#14B8A6", captada:"#22C55E"
};

const TIPO_LABELS = { piso:"Piso", chalet:"Chalet", casa:"Casa", local:"Local", terreno:"Terreno", finca:"Finca" };
const TIPOS = ["todos","piso","chalet","casa","local","terreno","finca"];

function load() {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(PROPS_INIT)); }
  catch { return JSON.parse(JSON.stringify(PROPS_INIT)); }
}
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(props)); } catch {} }

let props = load();
let filterTipo = 'todos';
let filterAgente = 'todos';
let modalId = null;
let showAdd = false;

function filtered() {
  const q = document.getElementById('search-input')?.value?.toLowerCase() || '';
  return props.filter(p => {
    if (filterTipo !== 'todos' && p.tipo !== filterTipo) return false;
    if (filterAgente !== 'todos' && p.agente !== filterAgente) return false;
    if (q && !p.titulo.toLowerCase().includes(q) && !p.loc.toLowerCase().includes(q)) return false;
    return true;
  });
}

function advanceState(id) {
  const p = props.find(x => x.id === id);
  if (p && NEXT[p.estado]) { p.estado = NEXT[p.estado]; if (!p.fecha) p.fecha = new Date().toLocaleDateString('es-ES'); save(); renderAll(); }
}

function openModal(id) { modalId = id; renderModal(); }
function closeModal() { modalId = null; document.getElementById('modal-container').innerHTML = ''; }

function saveField(id, field, val) {
  const p = props.find(x => x.id === id);
  if (p) { p[field] = val; save(); }
}

function openAddModal() { showAdd = true; renderAddModal(); }
function closeAddModal() { showAdd = false; document.getElementById('modal-container').innerHTML = ''; }

function submitAdd() {
  const get = id => document.getElementById(id)?.value?.trim() || '';
  const titulo = get('a-titulo');
  const loc = get('a-loc');
  if (!titulo || !loc) return;
  const newId = props.length ? Math.max(...props.map(x=>x.id)) + 1 : 1;
  props.unshift({
    id: newId,
    titulo, loc,
    precio: get('a-precio') || '—',
    tipo: get('a-tipo') || 'piso',
    agente: get('a-agente') || 'dani',
    telefono: get('a-telefono'),
    enlace: get('a-enlace'),
    descripcion: get('a-desc'),
    notas: '',
    estado: 'recibida',
    fecha: new Date().toLocaleDateString('es-ES'),
  });
  save();
  closeAddModal();
  renderAll();
}

function exportCSV() {
  const headers = ['ID','Título','Localización','Precio','Tipo','Estado','Agente','Teléfono','Fecha','Notas'];
  const rows = props.map(p => [p.id, p.titulo, p.loc, p.precio, TIPO_LABELS[p.tipo]||p.tipo, p.estado, p.agente, p.telefono, p.fecha, p.notas].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'cyc-crm.csv'; a.click();
  URL.revokeObjectURL(url);
}

function renderTopbar() {
  const c = {};
  COLS.forEach(col => c[col.key] = props.filter(p => p.estado === col.key).length);
  document.getElementById('topbar-stats').innerHTML = COLS.map(col =>
    `<div class="tstat"><span class="tdot" style="background:${col.color === '#4A4940' ? '#9E9D96' : col.color.replace('1A3A5C','6ba3d6').replace('92400E','f59e0b').replace('134E4A','14b8a6').replace('1B4332','22c55e')}"></span><strong>${c[col.key]}</strong> ${col.label}</div>`
  ).join('');
}

function renderStats() {
  const total = props.length;
  const captadas = props.filter(p=>p.estado==='captada').length;
  const enCurso = props.filter(p=>!['recibida','captada'].includes(p.estado)).length;
  const dani = props.filter(p=>p.agente==='dani').length;
  const marc = props.filter(p=>p.agente==='marc').length;
  const pct = v => total ? Math.round(v/total*100) : 0;
  document.getElementById('stats-panel').innerHTML = `
    <div class="scard">
      <div class="scard-label">Total</div>
      <div class="scard-val">${total}</div>
      <div class="scard-sub">propiedades</div>
    </div>
    <div class="scard">
      <div class="scard-label">En proceso</div>
      <div class="scard-val">${enCurso}</div>
      <div class="scard-sub">en seguimiento</div>
      <div class="scard-bar"><div class="scard-bar-fill" style="width:${pct(enCurso)}%;background:#F59E0B"></div></div>
    </div>
    <div class="scard">
      <div class="scard-label">Captadas</div>
      <div class="scard-val">${captadas}</div>
      <div class="scard-sub">${pct(captadas)}% del total</div>
      <div class="scard-bar"><div class="scard-bar-fill" style="width:${pct(captadas)}%;background:#22C55E"></div></div>
    </div>
    <div class="scard">
      <div class="scard-label">Dani</div>
      <div class="scard-val">${dani}</div>
      <div class="scard-sub">propiedades asignadas</div>
      <div class="scard-bar"><div class="scard-bar-fill" style="width:${pct(dani)}%;background:#8B5CF6"></div></div>
    </div>
    <div class="scard">
      <div class="scard-label">Marc</div>
      <div class="scard-val">${marc}</div>
      <div class="scard-sub">propiedades asignadas</div>
      <div class="scard-bar"><div class="scard-bar-fill" style="width:${pct(marc)}%;background:#F59E0B"></div></div>
    </div>`;
}

function renderFilters() {
  document.getElementById('tipo-filters').innerHTML = TIPOS.map(t =>
    `<button class="fbtn ${filterTipo===t?'active':''}" onclick="setTipo('${t}')">${t==='todos'?'Todos':TIPO_LABELS[t]}</button>`
  ).join('');
  document.getElementById('agente-filters').innerHTML = ['todos','dani','marc'].map(a =>
    `<button class="fbtn ${filterAgente===a?'active':''}" onclick="setAgente('${a}')">${a==='todos'?'Todos agentes':a.charAt(0).toUpperCase()+a.slice(1)}</button>`
  ).join('');
}

function setTipo(t) { filterTipo = t; renderFilters(); renderBoard(); }
function setAgente(a) { filterAgente = a; renderFilters(); renderBoard(); }

function renderBoard() {
  const fp = filtered();
  document.getElementById('board').innerHTML = COLS.map(col => {
    const cards = fp.filter(p => p.estado === col.key);
    return `<div class="col ${col.cls}">
      <div class="col-head">${col.label}<span class="col-cnt">${cards.length}</span></div>
      ${cards.length === 0 ? '<div class="empty">Sin propiedades</div>' : cards.map(p => `
        <div class="card" onclick="openModal(${p.id})">
          <div class="card-top">
            <div>
              <div class="card-title">${p.titulo}</div>
              <div class="card-loc">📍 ${p.loc}</div>
            </div>
          </div>
          <div class="card-price">${p.precio}</div>
          <div class="card-meta">
            <div class="card-tags"><span class="tag tag-${p.tipo}">${TIPO_LABELS[p.tipo]}</span></div>
            <span class="agent-badge agent-${p.agente}">${p.agente.charAt(0).toUpperCase()+p.agente.slice(1)}</span>
          </div>
          ${p.telefono ? `<div class="card-phone">📞 ${p.telefono}</div>` : ''}
          ${NEXT[p.estado] ? `<button class="card-btn" onclick="event.stopPropagation();advanceState(${p.id})">${NEXT_LABEL[p.estado]} →</button>` : ''}
        </div>`).join('')}
    </div>`;
  }).join('');
}

function renderModal() {
  const p = props.find(x => x.id === modalId);
  if (!p) return;
  const next = NEXT[p.estado];
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-bg" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <div class="modal-title">${p.titulo}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-price">${p.precio}</div>
        <div class="modal-grid">
          <div class="mfield">
            <div class="mfield-label">Localización</div>
            <div class="mfield-val">${p.loc}</div>
          </div>
          <div class="mfield">
            <div class="mfield-label">Tipo</div>
            <div class="mfield-val">${TIPO_LABELS[p.tipo]}</div>
          </div>
          <div class="mfield">
            <div class="mfield-label">Estado</div>
            <div class="mfield-val"><span class="estado-pill" style="${ESTADO_STYLE[p.estado]}">${p.estado.charAt(0).toUpperCase()+p.estado.slice(1)}</span></div>
          </div>
          <div class="mfield">
            <div class="mfield-label">Agente</div>
            <div class="mfield-val">${p.agente.charAt(0).toUpperCase()+p.agente.slice(1)}</div>
          </div>
          <div class="mfield">
            <div class="mfield-label">Teléfono</div>
            <div class="mfield-val phone">
              <input style="border:none;background:transparent;font-size:13px;font-weight:600;color:var(--accent-mid);width:100%;font-family:inherit;outline:none;" 
                placeholder="Añadir teléfono..." value="${p.telefono}" 
                onchange="saveField(${p.id},'telefono',this.value)">
            </div>
          </div>
          <div class="mfield">
            <div class="mfield-label">Fecha contacto</div>
            <div class="mfield-val">${p.fecha || '—'}</div>
          </div>
          <div class="mfield full">
            <div class="mfield-label">Enlace Fotocasa</div>
            <div class="mfield-val"><a href="${p.enlace}" target="_blank">${p.enlace ? 'Ver en Fotocasa →' : '—'}</a></div>
          </div>
        </div>
        ${p.descripcion ? `<div class="modal-section">Descripción</div><div class="modal-desc">${p.descripcion}</div>` : ''}
        <div class="modal-section">Notas de seguimiento</div>
        <textarea class="modal-input" placeholder="Añade notas sobre esta propiedad, conversaciones, detalles..." oninput="saveField(${p.id},'notas',this.value)">${p.notas}</textarea>
        <div class="modal-actions">
          <button class="mbtn" onclick="closeModal()">Cerrar</button>
          ${next ? `<button class="mbtn mbtn-accent" onclick="advanceState(${p.id});closeModal()">${NEXT_LABEL[p.estado]} →</button>` : `<span style="font-size:12px;color:var(--text3);align-self:center;padding:0 8px;">✓ Proceso completado</span>`}
        </div>
      </div>
    </div>`;
}

function renderAddModal() {
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-bg" onclick="closeAddModal()">
      <div class="add-modal" onclick="event.stopPropagation()">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;">
          <h2>Nueva propiedad</h2>
          <button class="modal-close" onclick="closeAddModal()">×</button>
        </div>
        <div class="form-grid">
          <div class="form-field full">
            <label class="form-label">Título *</label>
            <input id="a-titulo" class="form-input" placeholder="Ej: Piso céntrico con terraza">
          </div>
          <div class="form-field">
            <label class="form-label">Localización *</label>
            <input id="a-loc" class="form-input" placeholder="Ej: Vila-real">
          </div>
          <div class="form-field">
            <label class="form-label">Precio</label>
            <input id="a-precio" class="form-input" placeholder="Ej: 150.000 €">
          </div>
          <div class="form-field">
            <label class="form-label">Tipo</label>
            <select id="a-tipo" class="form-input">
              <option value="piso">Piso</option>
              <option value="chalet">Chalet</option>
              <option value="casa">Casa</option>
              <option value="local">Local</option>
              <option value="terreno">Terreno</option>
              <option value="finca">Finca</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">Agente</label>
            <select id="a-agente" class="form-input">
              <option value="dani">Dani</option>
              <option value="marc">Marc</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">Teléfono propietario</label>
            <input id="a-telefono" class="form-input" placeholder="Ej: 600 000 000">
          </div>
          <div class="form-field full">
            <label class="form-label">Enlace Fotocasa</label>
            <input id="a-enlace" class="form-input" placeholder="https://www.fotocasa.es/...">
          </div>
          <div class="form-field full">
            <label class="form-label">Descripción</label>
            <textarea id="a-desc" class="form-input" placeholder="Breve descripción de la propiedad..."></textarea>
          </div>
        </div>
        <div class="modal-actions" style="margin-top:1.25rem;">
          <button class="mbtn" onclick="closeAddModal()">Cancelar</button>
          <button class="mbtn mbtn-accent" onclick="submitAdd()">Añadir propiedad →</button>
        </div>
      </div>
    </div>`;
}

function renderAll() {
  renderTopbar();
  renderStats();
  renderFilters();
  renderBoard();
}

renderAll();
</script>
</body>
</html>
